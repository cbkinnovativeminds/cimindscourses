/* ═══ TOAST HOOK */
function useToast() {
  const [toasts, setToasts] = useState([]);
  const add = useCallback((msg, type = "success") => {
    const id = Date.now() + Math.random();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3200);
  }, []);
  return { toasts, add };
}

/* ═══ BUTTON */
function Btn({ children, variant="primary", size="md", onClick, disabled=false, full=false, style:sx={} }) {
  const [hov, setHov] = useState(false);
  const pad = size==="sm" ? "6px 14px" : size==="lg" ? "11px 28px" : "8px 18px";
  const fz  = size==="sm" ? 13 : size==="lg" ? 15 : 14;
  const vs = {
    primary: { background: disabled ? "#7AABEE" : hov ? "#004BB5" : "#0056D2", color:"#fff", border:"none" },
    outline:  { background: hov ? "#EBF1FB" : "#fff", color:"#0056D2", border:"1px solid #0056D2" },
    ghost:    { background: hov ? "#EBEBEB" : "#fff", color:"#1F1F1F", border:"1px solid #CCCCCC" },
    link:     { background:"transparent", color: hov ? "#004BB5" : "#0056D2", border:"none", padding:0, fontSize:"inherit", textDecoration: hov ? "underline" : "none" },
    danger:   { background: hov ? "#c0392b" : "#e74c3c", color:"#fff", border:"none" },
  };
  return (
    <button disabled={disabled} onClick={onClick}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{ display:"inline-flex", alignItems:"center", justifyContent:"center", gap:6, padding:pad, fontSize:fz, fontWeight:600, borderRadius:4, cursor: disabled ? "not-allowed" : "pointer", transition:"all 0.15s", fontFamily:"'Source Sans Pro',sans-serif", width: full ? "100%" : undefined, ...vs[variant], ...sx }}>
      {children}
    </button>
  );
}

/* ═══ MODAL */
function Modal({ open, onClose, title, children, width=460 }) {
  useEffect(() => {
    document.body.style.overflow = open ? "hidden" : "";
    return () => { document.body.style.overflow = ""; };
  }, [open]);
  if (!open) return null;
  return (
    <div onClick={onClose} style={{ position:"fixed", inset:0, zIndex:800, background:"rgba(0,0,0,0.45)", display:"flex", alignItems:"center", justifyContent:"center", padding:16, animation:"ciMFadeIn .18s ease" }}>
      <div onClick={e => e.stopPropagation()} style={{ background:"#fff", borderRadius:8, width:"100%", maxWidth:width, boxShadow:"0 20px 60px rgba(0,0,0,.22)", overflow:"hidden", animation:"ciMScale .2s ease" }}>
        <div style={{ padding:"18px 24px 14px", borderBottom:"1px solid #E0E0E0", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <h2 style={{ margin:0, fontSize:17, fontWeight:700 }}>{title}</h2>
          <button onClick={onClose} style={{ background:"none", border:"none", cursor:"pointer", color:"#636363", fontSize:22, lineHeight:1 }}>×</button>
        </div>
        <div style={{ padding:24 }}>{children}</div>
      </div>
    </div>
  );
}

/* ═══ AUTH MODAL CONTENT */
function AuthContent({ mode, onClose, onSuccess, toast }) {
  const [tab, setTab]     = useState(mode);
  const [name, setName]   = useState("");
  const [email, setEmail] = useState("");
  const [pass, setPass]   = useState("");
  const [errs, setErrs]   = useState({});
  const [busy, setBusy]   = useState(false);

  const validate = () => {
    const e = {};
    if (tab==="join" && !name.trim()) e.name = "Full name is required";
    if (!email.includes("@"))         e.email = "Enter a valid email";
    if (pass.length < 6)              e.pass = "Minimum 6 characters";
    setErrs(e); return Object.keys(e).length === 0;
  };

  const submit = () => {
    if (!validate()) return;
    setBusy(true);
    setTimeout(() => {
      setBusy(false);
      onSuccess(name || email.split("@")[0]);
      toast(tab==="join" ? "Welcome to CI Minds! 🎉" : "Welcome back!", "success");
      onClose();
    }, 900);
  };

  const Field = ({ label, value, onChange, type="text", err, placeholder }) => (
    <div style={{ marginBottom:14 }}>
      <label style={{ display:"block", fontSize:13, fontWeight:600, marginBottom:5 }}>{label}</label>
      <input value={value} onChange={e => onChange(e.target.value)} type={type} placeholder={placeholder}
        style={{ width:"100%", padding:"9px 12px", fontSize:14, border:`1px solid ${err ? "#E74C3C" : "#CCCCCC"}`, borderRadius:4, fontFamily:"'Source Sans Pro',sans-serif", boxSizing:"border-box", outline:"none" }}/>
      {err && <div style={{ color:"#E74C3C", fontSize:12, marginTop:3 }}>{err}</div>}
    </div>
  );

  return (
    <div>
      <div style={{ display:"flex", borderBottom:"1px solid #E0E0E0", marginBottom:22, marginTop:-8 }}>
        {["join","login"].map(t => (
          <button key={t} onClick={() => { setTab(t); setErrs({}); }}
            style={{ flex:1, padding:"10px 0", background:"none", border:"none", cursor:"pointer", fontSize:14, fontWeight:600, color: tab===t ? "#0056D2" : "#636363", borderBottom: tab===t ? "2px solid #0056D2" : "2px solid transparent", fontFamily:"'Source Sans Pro',sans-serif", transition:"all .15s" }}>
            {t==="join" ? "Join for Free" : "Log In"}
          </button>
        ))}
      </div>
      {tab==="join" && <Field label="Full Name" value={name} onChange={setName} placeholder="Your full name" err={errs.name}/>}
      <Field label="Email" value={email} onChange={setEmail} type="email" placeholder="name@example.com" err={errs.email}/>
      <Field label="Password" value={pass} onChange={setPass} type="password" placeholder="Min. 6 characters" err={errs.pass}/>
      <Btn variant="primary" size="lg" onClick={submit} disabled={busy} full>
        {busy ? "Please wait…" : tab==="join" ? "Create Account" : "Log In"}
      </Btn>
      <p style={{ textAlign:"center", fontSize:13, color:"#636363", marginTop:14 }}>
        {tab==="join" ? "Already have an account? " : "New to CI Minds? "}
        <Btn variant="link" onClick={() => { setTab(tab==="join" ? "login" : "join"); setErrs({}); }}>
          {tab==="join" ? "Log in" : "Join for free"}
        </Btn>
      </p>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════════════════════ */
function CIMindsApp() {
  const [search,       setSearch]    = useState("");
  const [activeCat,    setActiveCat] = useState("All");
  const [activeLevel,  setLevel]     = useState("All Levels");
  const [sortBy,       setSort]      = useState("Most Popular");
  const [sortOpen,     setSortOpen]  = useState(false);
  const [authModal,    setAuth]      = useState(null);
  const [user,         setUser]      = useState(null);
  const [userMenu,     setUserMenu]  = useState(false);
  const [selected,     setSelected]  = useState(null);
  const [saved,        setSaved]     = useState([]);
  const [enrolled,     setEnrolled]  = useState([]);
  const [savedView,    setSavedView] = useState(false);
  const [showAll,      setShowAll]   = useState(false);
  const courseRef = useRef(null);
  const { toasts, add: toast } = useToast();

  /* Filtered & sorted */
  const base = savedView ? COURSES.filter(c => saved.includes(c.id)) : COURSES;
  const filtered = base.filter(c => {
    if (activeCat !== "All" && c.category !== activeCat) return false;
    if (activeLevel !== "All Levels" && c.level !== activeLevel) return false;
    const q = search.toLowerCase();
    if (q && !c.title.toLowerCase().includes(q) && !c.provider.toLowerCase().includes(q) && !c.skills.some(s => s.toLowerCase().includes(q))) return false;
    return true;
  }).sort((a,b) => {
    if (sortBy==="Highest Rated")     return b.rating - a.rating;
    if (sortBy==="Shortest Duration") return a.durationN - b.durationN;
    if (sortBy==="Newest")            return b.id - a.id;
    return (b.popular?1:0)-(a.popular?1:0);
  });
  const visible = showAll ? filtered : filtered.slice(0,6);

  const toggleSave = (c) => {
    const was = saved.includes(c.id);
    setSaved(s => was ? s.filter(id=>id!==c.id) : [...s,c.id]);
    toast(was ? `Removed from saved` : `Saved "${c.title}"`, was?"info":"success");
  };
  const handleEnroll = (c) => {
    if (!user) { setSelected(null); setAuth("join"); return; }
    setEnrolled(e => e.includes(c.id) ? e : [...e,c.id]);
    toast(`Enrolled in "${c.title}" 🎉`, "success");
  };

  const scrollToCourses = () => courseRef.current?.scrollIntoView({ behavior:"smooth" });

  useEffect(() => {
    const h = () => { setSortOpen(false); setUserMenu(false); };
    document.addEventListener("click", h);
    return () => document.removeEventListener("click", h);
  }, []);

  return (
    <div style={{ minHeight:"100vh", background:"#F5F7FA", fontFamily:"'Source Sans Pro','Segoe UI',sans-serif", color:"#1F1F1F" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700&display=swap');
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        input,button,select{font-family:'Source Sans Pro',sans-serif;}
        @keyframes ciMFadeIn {from{opacity:0}to{opacity:1}}
        @keyframes ciMScale  {from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
        @keyframes ciMSlide  {from{transform:translateX(100%)}to{transform:translateX(0)}}
        @keyframes ciMToast  {from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        @keyframes ciMFadeUp {from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
        .fu{animation:ciMFadeUp .5s ease both;}
        .fu1{animation-delay:.07s;} .fu2{animation-delay:.14s;} .fu3{animation-delay:.21s;}
        ::-webkit-scrollbar{width:6px;}
        ::-webkit-scrollbar-thumb{background:#D0D0D0;border-radius:4px;}
        input:focus{outline:none;border-color:#0056D2!important;box-shadow:0 0 0 3px #ADC8FF44;}
        select:focus{outline:none;}
      `}</style>

      {/* ── NAV ── */}
      <header style={{ background:"#fff", borderBottom:"1px solid #E0E0E0", position:"sticky", top:0, zIndex:200 }}>
        <div style={{ maxWidth:1280, margin:"0 auto", padding:"0 24px", height:64, display:"flex", alignItems:"center", gap:18 }}>

          {/* Logo */}
          <div style={{ display:"flex", alignItems:"center", gap:8, flexShrink:0, cursor:"pointer" }}
            onClick={() => { setSavedView(false); setActiveCat("All"); setSearch(""); setShowAll(false); }}>
            <div style={{ width:36, height:36, borderRadius:8, background:"#0056D2", display:"flex", alignItems:"center", justifyContent:"center", color:"#fff", fontWeight:700, fontSize:14 }}>CI</div>
            <span style={{ fontWeight:700, fontSize:20, color:"#0056D2", letterSpacing:"-0.01em" }}>CI Minds</span>
          </div>

          {/* Search */}
          <div style={{ flex:1, maxWidth:400, display:"flex", alignItems:"center", background:"#F5F7FA", border:"1px solid #CCCCCC", borderRadius:4, padding:"0 12px", height:38 }}>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#636363" strokeWidth="2" style={{ flexShrink:0 }}>
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input value={search} onChange={e => { setSearch(e.target.value); setShowAll(true); }}
              placeholder="What do you want to learn?"
              style={{ background:"none", border:"none", flex:1, fontSize:14, color:"#1F1F1F", padding:"0 8px" }}/>
            {search && <button onClick={() => setSearch("")} style={{ background:"none", border:"none", cursor:"pointer", color:"#999", fontSize:18, lineHeight:1 }}>×</button>}
          </div>

          {/* Nav links */}
          <nav style={{ display:"flex", gap:20, flexShrink:0 }}>
            {["Explore","Enterprise","Government","Campus"].map(l => (
              <button key={l} onClick={() => toast(`${l} page coming soon`, "info")}
                style={{ background:"none", border:"none", fontSize:14, color:"#1F1F1F", cursor:"pointer", fontFamily:"'Source Sans Pro',sans-serif", transition:"color .15s", whiteSpace:"nowrap" }}
                onMouseEnter={e=>e.target.style.color="#0056D2"} onMouseLeave={e=>e.target.style.color="#1F1F1F"}>
                {l}
              </button>
            ))}
          </nav>

          {/* Right */}
          <div style={{ marginLeft:"auto", display:"flex", gap:8, alignItems:"center", flexShrink:0 }}>
            <button onClick={() => { setSavedView(v=>!v); scrollToCourses(); }}
              style={{ background: savedView?"#E8F0FE":"none", border:`1px solid ${savedView?"#0056D2":"#E0E0E0"}`, borderRadius:4, padding:"6px 12px", cursor:"pointer", fontSize:13, color: savedView?"#0056D2":"#636363", display:"flex", alignItems:"center", gap:5, fontFamily:"'Source Sans Pro',sans-serif", transition:"all .15s" }}>
              ♥ Saved{saved.length>0?` (${saved.length})`:""}
            </button>

            {user ? (
              <div style={{ position:"relative" }} onClick={e => { e.stopPropagation(); setUserMenu(v=>!v); }}>
                <div style={{ width:36, height:36, borderRadius:"50%", background:"#0056D2", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", color:"#fff", fontWeight:700, fontSize:14, userSelect:"none" }}>
                  {user.name[0].toUpperCase()}
                </div>
                {userMenu && (
                  <div onClick={e=>e.stopPropagation()}
                    style={{ position:"absolute", top:44, right:0, background:"#fff", border:"1px solid #E0E0E0", borderRadius:6, width:210, boxShadow:"0 8px 24px rgba(0,0,0,.12)", zIndex:300, overflow:"hidden", animation:"ciMScale .15s ease" }}>
                    <div style={{ padding:"14px 16px", borderBottom:"1px solid #F0F0F0" }}>
                      <div style={{ fontWeight:700, fontSize:14 }}>{user.name}</div>
                      <div style={{ fontSize:12, color:"#636363" }}>{enrolled.length} course{enrolled.length!==1?"s":""} enrolled</div>
                    </div>
                    {[
                      { label:"My Learning",    fn:() => { setSavedView(false); setUserMenu(false); scrollToCourses(); } },
                      { label:"Saved Courses",  fn:() => { setSavedView(true); setUserMenu(false); scrollToCourses(); } },
                      { label:"Profile",        fn:() => { toast("Profile settings coming soon","info"); setUserMenu(false); } },
                      { label:"Log Out",        fn:() => { setUser(null); setUserMenu(false); toast("Logged out","info"); }, red:true },
                    ].map(item => (
                      <button key={item.label} onClick={item.fn}
                        style={{ width:"100%", textAlign:"left", background:"none", border:"none", padding:"11px 16px", cursor:"pointer", fontSize:14, color: item.red?"#E74C3C":"#1F1F1F", fontFamily:"'Source Sans Pro',sans-serif" }}
                        onMouseEnter={e=>e.target.style.background="#F5F7FA"} onMouseLeave={e=>e.target.style.background="none"}>
                        {item.label}
                      </button>
                    ))}
                  </div>
                )}
              </div>
            ) : (
              <>
                <Btn variant="outline" onClick={() => setAuth("login")}>Log In</Btn>
                <Btn variant="primary" onClick={() => setAuth("join")}>Join for Free</Btn>
              </>
            )}
          </div>
        </div>
      </header>

      {/* ── HERO ── */}
      <div style={{ background:"#fff", borderBottom:"1px solid #E0E0E0" }}>
        <div style={{ maxWidth:1280, margin:"0 auto", padding:"44px 24px 40px" }}>
          {/* Breadcrumb */}
          <div style={{ fontSize:13, color:"#636363", marginBottom:14, display:"flex", gap:6, alignItems:"center" }}>
            <button onClick={() => { setSavedView(false); setActiveCat("All"); setSearch(""); }}
              style={{ background:"none", border:"none", cursor:"pointer", color:"#0056D2", fontSize:13, padding:0, fontFamily:"'Source Sans Pro',sans-serif" }}>Home</button>
            <span>›</span><span>Certifications</span>
          </div>

          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:32, flexWrap:"wrap" }}>
            <div style={{ maxWidth:680 }}>
              <h1 className="fu" style={{ fontSize:"clamp(26px,3.5vw,40px)", fontWeight:700, lineHeight:1.2, marginBottom:14 }}>
                Prepare for an industry certification
              </h1>
              <p className="fu fu1" style={{ fontSize:16, color:"#636363", lineHeight:1.65, marginBottom:24 }}>
                Build job-ready skills and earn credentials recognized by top employers worldwide. Explore industry certifications across AI, cloud, data, cybersecurity, and more.
              </p>
              <div className="fu fu2" style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
                <Btn variant="primary" size="lg" onClick={scrollToCourses}>Browse all certifications</Btn>
                <Btn variant="outline" size="lg" onClick={() => user ? toast(`Welcome, ${user.name}!`,"info") : setAuth("join")}>
                  {user ? `My dashboard` : "Try for free"}
                </Btn>
              </div>
            </div>

            {/* Stats panel */}
            <div className="fu fu3" style={{ background:"#F5F7FA", border:"1px solid #E0E0E0", borderRadius:8, padding:"24px 28px", minWidth:220, flexShrink:0 }}>
              {[["1M+","learners enrolled"],["200+","certification programs"],["94%","positive career outcome"]].map(([n,l],i) => (
                <div key={l} style={{ padding:"10px 0", borderBottom: i<2?"1px solid #E0E0E0":"none" }}>
                  <div style={{ fontSize:24, fontWeight:700, color:"#0056D2" }}>{n}</div>
                  <div style={{ fontSize:13, color:"#636363" }}>{l}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Partner strip */}
          <div style={{ marginTop:36 }}>
            <p style={{ fontSize:13, color:"#636363", marginBottom:12 }}>Certification programs from world-class organizations:</p>
            <div style={{ display:"flex", flexWrap:"wrap", gap:10 }}>
              {PARTNERS.map(p => (
                <div key={p.name} style={{ display:"flex", alignItems:"center", gap:7, background:"#fff", border:"1px solid #E0E0E0", borderRadius:4, padding:"6px 14px", cursor:"default" }}>
                  <div style={{ width:20, height:20, borderRadius:3, background:p.color, display:"flex", alignItems:"center", justifyContent:"center", color:"#fff", fontSize:8, fontWeight:700 }}>{p.logo}</div>
                  <span style={{ fontSize:13, fontWeight:600 }}>{p.name}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>

      {/* ── COURSES SECTION ── */}
      <div ref={courseRef} style={{ maxWidth:1280, margin:"0 auto", padding:"32px 24px 72px" }}>

        {/* Toolbar */}
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:12, marginBottom:16 }}>
          {/* Category pills */}
          <div style={{ display:"flex", gap:7, flexWrap:"wrap" }}>
            {CATEGORIES.map(cat => (
              <button key={cat} onClick={() => { setActiveCat(cat); setShowAll(false); setSavedView(false); }}
                style={{ background: activeCat===cat?"#E8F0FE":"#fff", color: activeCat===cat?"#0056D2":"#1F1F1F", border:`1px solid ${activeCat===cat?"#ADC8FF":"#CCCCCC"}`, borderRadius:20, padding:"6px 16px", fontSize:13, fontWeight: activeCat===cat?600:400, cursor:"pointer", transition:"all .15s", whiteSpace:"nowrap", fontFamily:"'Source Sans Pro',sans-serif" }}>
                {cat}
              </button>
            ))}
          </div>

          {/* Filters */}
          <div style={{ display:"flex", gap:8, alignItems:"center" }}>
            <select value={activeLevel} onChange={e => setLevel(e.target.value)}
              style={{ border:"1px solid #CCCCCC", borderRadius:4, padding:"7px 10px", fontSize:13, background:"#fff", cursor:"pointer" }}>
              {LEVELS.map(l => <option key={l}>{l}</option>)}
            </select>

            {/* Sort */}
            <div style={{ position:"relative" }} onClick={e => e.stopPropagation()}>
              <button onClick={() => setSortOpen(v=>!v)}
                style={{ border:"1px solid #CCCCCC", borderRadius:4, padding:"7px 12px", fontSize:13, background:"#fff", cursor:"pointer", display:"flex", alignItems:"center", gap:6, fontFamily:"'Source Sans Pro',sans-serif" }}>
                Sort: <strong>{sortBy}</strong>
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#636363" strokeWidth="2.5"
                  style={{ transform: sortOpen?"rotate(180deg)":"rotate(0)", transition:"transform .2s" }}>
                  <path d="M6 9l6 6 6-6"/>
                </svg>
              </button>
              {sortOpen && (
                <div style={{ position:"absolute", top:40, right:0, background:"#fff", border:"1px solid #E0E0E0", borderRadius:6, width:200, boxShadow:"0 8px 24px rgba(0,0,0,.1)", zIndex:100, overflow:"hidden", animation:"ciMScale .15s ease" }}>
                  {SORT_OPTS.map(opt => (
                    <button key={opt} onClick={() => { setSort(opt); setSortOpen(false); }}
                      style={{ width:"100%", textAlign:"left", background: sortBy===opt?"#E8F0FE":"none", border:"none", padding:"10px 16px", cursor:"pointer", fontSize:13, color: sortBy===opt?"#0056D2":"#1F1F1F", fontWeight: sortBy===opt?600:400, fontFamily:"'Source Sans Pro',sans-serif" }}
                      onMouseEnter={e=>{ if(sortBy!==opt) e.target.style.background="#F5F7FA"; }}
                      onMouseLeave={e=>{ if(sortBy!==opt) e.target.style.background="none"; }}>
                      {sortBy===opt?"✓  ":""}{opt}
                    </button>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>

        {/* Results bar */}
        <div style={{ fontSize:14, color:"#636363", marginBottom:20, display:"flex", alignItems:"center", flexWrap:"wrap", gap:8 }}>
          {savedView && <span style={{ background:"#E8F0FE", color:"#0056D2", fontSize:12, fontWeight:600, padding:"2px 10px", borderRadius:3 }}>♥ Saved</span>}
          Showing <strong style={{ color:"#1F1F1F", margin:"0 4px" }}>{filtered.length}</strong> result{filtered.length!==1?"s":""}
          {activeCat!=="All" ? ` · ${activeCat}` : ""}{activeLevel!=="All Levels" ? ` · ${activeLevel}` : ""}{search ? ` · "${search}"` : ""}
          {(activeCat!=="All"||activeLevel!=="All Levels"||search||savedView) && (
            <button onClick={() => { setActiveCat("All"); setLevel("All Levels"); setSearch(""); setSavedView(false); setShowAll(false); }}
              style={{ marginLeft:4, background:"none", border:"1px solid #CCCCCC", borderRadius:4, padding:"2px 10px", fontSize:12, color:"#636363", cursor:"pointer", fontFamily:"'Source Sans Pro',sans-serif" }}>
              Clear all ×
            </button>
          )}
        </div>

        {/* Grid */}
        {visible.length > 0 ? (
          <>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))", gap:20 }}>
              {visible.map(c => (
                <CourseCard key={c.id} course={c} onOpen={setSelected} saved={saved.includes(c.id)} onSave={toggleSave}/>
              ))}
            </div>
            {filtered.length > 6 && (
              <div style={{ textAlign:"center", marginTop:36 }}>
                <Btn variant="ghost" size="lg" onClick={() => setShowAll(v=>!v)}>
                  {showAll ? "Show less ▲" : `Show all ${filtered.length} results ▼`}
                </Btn>
              </div>
            )}
          </>
        ) : (
          <div style={{ textAlign:"center", padding:"60px 24px", background:"#fff", borderRadius:8, border:"1px solid #E0E0E0" }}>
            <div style={{ fontSize:48, marginBottom:12 }}>🔍</div>
            <h3 style={{ fontSize:18, fontWeight:700, marginBottom:8 }}>No results found</h3>
            <p style={{ color:"#636363", fontSize:14, marginBottom:20 }}>
              {savedView ? "You haven't saved any courses yet." : "Try adjusting your search or filters."}
            </p>
            <Btn variant="primary" onClick={() => { setActiveCat("All"); setLevel("All Levels"); setSearch(""); setSavedView(false); }}>
              Browse all certifications
            </Btn>
          </div>
        )}

        {/* What is a cert */}
        <section style={{ marginTop:64, background:"#fff", borderRadius:8, border:"1px solid #E0E0E0", padding:"40px" }}>
          <h2 style={{ fontSize:22, fontWeight:700, marginBottom:12 }}>What is a Professional Certificate?</h2>
          <p style={{ fontSize:15, color:"#636363", lineHeight:1.7, maxWidth:780, marginBottom:32 }}>
            Professional certificates are credentials that demonstrate your proficiency in a job-relevant skill. Earning a certificate involves completing a series of courses and hands-on projects, then sharing your verified credential with employers.
          </p>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(190px,1fr))", gap:24 }}>
            {[["🎓","Expert-designed content","Built by industry leaders and academic institutions."],["📅","Flexible schedule","Learn at your own pace, online and on-demand."],["✅","Shareable certificate","Add your credential directly to your LinkedIn profile."],["💼","Career support","Interview prep, resume tips, and employer connections."]].map(([icon,title,desc]) => (
              <div key={title} style={{ display:"flex", flexDirection:"column", gap:8 }}>
                <div style={{ fontSize:28 }}>{icon}</div>
                <div style={{ fontWeight:700, fontSize:15 }}>{title}</div>
                <div style={{ fontSize:14, color:"#636363", lineHeight:1.5 }}>{desc}</div>
              </div>
            ))}
          </div>
          <div style={{ marginTop:28 }}>
            <Btn variant="outline" onClick={scrollToCourses}>Browse certification programs</Btn>
          </div>
        </section>

        {/* FAQ */}
        <section style={{ marginTop:48 }}>
          <h2 style={{ fontSize:22, fontWeight:700, marginBottom:20 }}>Frequently Asked Questions</h2>
          <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
            {[
              ["How long does it take to earn a certificate?","Most programs can be completed in 3 to 6 months at roughly 10 hours per week. Self-paced programs let you go faster or slower depending on your schedule."],
              ["Are CI Minds certificates recognized by employers?","Yes — CI Minds certificates are recognized by hundreds of global employers. Many programs are co-designed with Google, IBM, Microsoft, and Amazon."],
              ["Can I get a certificate for free?","Many programs offer a 7-day free trial. Financial aid is available for qualifying learners. You can also audit most courses for free without receiving a certificate."],
              ["What's the difference between a certificate and a degree?","Certificates are shorter, skill-focused credentials. Degrees are longer academic programs. Certificates are ideal for career advancement or pivoting into a new field quickly."],
              ["Can I get a refund if I'm not satisfied?","Yes. CI Minds offers a 14-day money-back guarantee on all paid programs. Contact support within 14 days for a full refund — no questions asked."],
            ].map(([q,a]) => <FaqItem key={q} q={q} a={a}/>)}
          </div>
        </section>
      </div>

      {/* ── FOOTER ── */}
      <footer style={{ background:"#fff", borderTop:"1px solid #E0E0E0", padding:"36px 24px" }}>
        <div style={{ maxWidth:1280, margin:"0 auto" }}>
          <div style={{ display:"flex", justifyContent:"space-between", flexWrap:"wrap", gap:32, marginBottom:28 }}>
            <div>
              <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
                <div style={{ width:28, height:28, borderRadius:6, background:"#0056D2", display:"flex", alignItems:"center", justifyContent:"center", color:"#fff", fontWeight:700, fontSize:11 }}>CI</div>
                <span style={{ fontWeight:700, color:"#0056D2", fontSize:16 }}>CI Minds</span>
              </div>
              <p style={{ fontSize:13, color:"#636363", maxWidth:260, lineHeight:1.6 }}>Empowering learners worldwide with industry-recognized certifications and job-ready skills.</p>
            </div>
            <div style={{ display:"flex", gap:48, flexWrap:"wrap" }}>
              {[["Platform",["About","Careers","Blog","Press"]],["Learn",["All Courses","Certifications","Degrees","Enterprise"]],["Support",["Help Center","Accessibility","Contact","Refunds"]]].map(([heading, links]) => (
                <div key={heading}>
                  <div style={{ fontSize:12, fontWeight:700, textTransform:"uppercase", letterSpacing:".06em", marginBottom:12 }}>{heading}</div>
                  {links.map(l => (
                    <button key={l} onClick={() => toast(`${l} — coming soon`, "info")}
                      style={{ display:"block", background:"none", border:"none", padding:"4px 0", cursor:"pointer", fontSize:13, color:"#636363", fontFamily:"'Source Sans Pro',sans-serif", transition:"color .15s" }}
                      onMouseEnter={e=>e.target.style.color="#0056D2"} onMouseLeave={e=>e.target.style.color="#636363"}>
                      {l}
                    </button>
                  ))}
                </div>
              ))}
            </div>
          </div>
          <div style={{ borderTop:"1px solid #E0E0E0", paddingTop:20, display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:12 }}>
            <span style={{ color:"#636363", fontSize:13 }}>© 2026 CI Minds, Inc. All rights reserved.</span>
            <div style={{ display:"flex", gap:16 }}>
              {["Privacy","Terms","Cookies","Sitemap"].map(l => (
                <button key={l} onClick={() => toast(`${l} — coming soon`,"info")}
                  style={{ background:"none", border:"none", cursor:"pointer", fontSize:13, color:"#636363", fontFamily:"'Source Sans Pro',sans-serif" }}>
                  {l}
                </button>
              ))}
            </div>
          </div>
        </div>
      </footer>

      {/* ── MODALS ── */}
      <Modal open={!!authModal} onClose={() => setAuth(null)} title={authModal==="join"?"Join CI Minds for Free":"Welcome back"}>
        <AuthContent mode={authModal} onClose={() => setAuth(null)} onSuccess={n=>setUser({name:n})} toast={toast}/>
      </Modal>

      <CourseDrawer course={selected} onClose={() => setSelected(null)} onEnroll={handleEnroll}
        saved={selected?saved.includes(selected.id):false} onSave={toggleSave} user={user}/>

      {/* ── TOASTS ── */}
      <div style={{ position:"fixed", bottom:28, right:28, zIndex:9999, display:"flex", flexDirection:"column", gap:10 }}>
        {toasts.map(t => (
          <div key={t.id} style={{ background: t.type==="error"?"#E74C3C":t.type==="info"?"#0056D2":"#27AE60", color:"#fff", padding:"12px 20px", borderRadius:6, fontSize:14, fontWeight:600, boxShadow:"0 4px 16px rgba(0,0,0,.18)", maxWidth:320, lineHeight:1.4, animation:"ciMToast .25s ease" }}>
            {t.type==="success"?"✓ ":t.type==="error"?"✕ ":"ℹ "}{t.msg}
          </div>
        ))}
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById("root"));
